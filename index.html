<style>
:root{
  --bg:#09111f;--panel:#121c2e;--line:#26364f;--text:#f7fafc;--muted:#a7b1c2;--green:#38a169;--red:#fc8181;
  --cardShadow:0 8px 24px rgba(0,0,0,.22);
}
.light-theme{--bg:#f7fafc;--panel:#ffffff;--line:#cbd5e0;--text:#1a202c;--muted:#4a5568;--green:#2f855a;--red:#e53e3e}
.high-contrast{--bg:#000000;--panel:#111111;--line:#ffffff;--text:#ffffff;--muted:#e2e8f0;--green:#00ff66;--red:#ff4444}

*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;padding-bottom:86px;line-height:1.35}
header{position:sticky;top:0;background:rgba(9,17,31,.96);border-bottom:1px solid var(--line);padding:14px 16px;z-index:2;backdrop-filter:blur(8px)}
h1{font-size:22px;margin:0;font-weight:900}
h2{font-size:18px;margin:0 0 12px;font-weight:900}
.sub,.small{color:var(--muted);font-size:12px}
.wrap{max-width:980px;margin:0 auto;padding:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;margin:12px 0;box-shadow:var(--cardShadow)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
label{display:block;font-size:12px;color:var(--muted);margin:8px 0 5px}
input,select,button{width:100%;border-radius:14px;border:1px solid #33445f;background:#0f1a2b;color:var(--text);padding:13px;font-size:16px}
button{background:linear-gradient(135deg,#2f855a,#38a169);border:0;font-weight:900;cursor:pointer;min-height:46px}
.btn2{background:#1f2f48;border:1px solid #33445f}
.btn-red{background:#742a2a}
.hidden{display:none!important}
.match,.team{background:#0e1728;border:1px solid var(--line);border-radius:16px;padding:12px;margin:10px 0}
.toggle{display:flex;align-items:center;gap:8px}
.toggle input{width:auto}
.leader-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;background:#0e1728;border:1px solid var(--line);padding:12px;border-radius:15px;margin:8px 0}
.score{font-size:24px;font-weight:900;color:#68d391}
.scroll{overflow:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border-bottom:1px solid var(--line);padding:9px;text-align:center}
th{color:var(--muted)}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(9,17,31,.96);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:8px;z-index:5}
.nav button{font-size:12px;padding:10px 5px;background:#18243a;min-height:44px}
.nav button.active{background:#2f855a}
.ok{color:#68d391}
.bad{color:var(--red)}
.trend{display:flex;align-items:end;gap:8px;height:130px;border-bottom:1px solid var(--line);padding:10px 4px;margin-top:10px}
.bar{flex:1;background:var(--green);border-radius:8px 8px 0 0;min-width:14px;position:relative}
.bar span{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--text)}
.trend-labels{display:flex;gap:8px;font-size:10px;color:var(--muted)}
.trend-labels div{flex:1;text-align:center}

/* Compact Summary dashboard — presentation only; scoring logic is unchanged. */
#summaryContent{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}
#summaryContent .card{
  min-width:0;
  margin:0;
  padding:12px;
  border-radius:14px;
  box-shadow:0 4px 14px rgba(0,0,0,.16);
}
#summaryContent .card h2{
  margin-bottom:8px;
  font-size:15px;
  line-height:1.2;
}
#summaryContent .card label{
  margin:5px 0 3px;
  font-size:11px;
}
#summaryContent .card input,
#summaryContent .card select,
#summaryContent .card button{
  min-height:36px;
  padding:8px 10px;
  border-radius:10px;
  font-size:13px;
}
#summaryContent .match,
#summaryContent .team,
#summaryContent .leader-row{
  margin:5px 0;
  padding:8px;
  border-radius:10px;
}
#summaryContent .leader-row{gap:6px}
#summaryContent .score{font-size:20px}
#summaryContent table{font-size:11px}
#summaryContent th,
#summaryContent td{
  padding:6px 5px;
  white-space:nowrap;
}
#summaryContent .small,
#summaryContent .sub{font-size:10px}
#summaryContent .summary-more{
  width:100%;
  min-height:34px;
  margin-top:8px;
  padding:7px 10px;
  background:#18243a;
  color:#c6f6d5;
  border:1px solid #2f855a;
}
#summaryContent .summary-hidden,#summaryContent .summary-filter-hidden{display:none}
#summaryContent .summary-toolbar{grid-column:1/-1}
#summaryContent .summary-card-title{display:flex;align-items:center;gap:8px}
#summaryContent .summary-card-title h2{flex:1;margin:0}
#summaryContent .summary-collapse{width:auto!important;min-width:38px;padding:5px 9px!important;background:#18243a!important}
#summaryContent .summary-card-body.collapsed{display:none}
#summaryContent .summary-highlight{grid-column:1/-1;border-color:#2f855a;background:linear-gradient(135deg,var(--panel),rgba(47,133,90,.18))}
#summaryContent .summary-highlight-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
#summaryContent .summary-stat{padding:9px;border-radius:10px;background:#0e1728;text-align:center}
#summaryContent .summary-stat b{display:block;font-size:17px;color:#68d391}
#summaryContent .swipe-hint{display:none;text-align:right;margin:3px 0 0}
.loading-box{padding:18px;text-align:center;color:var(--muted)}
.loading-box::before{content:'⛳';display:block;font-size:28px;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{50%{transform:scale(1.15);opacity:.55}}
#summaryContent .trend{
  height:140px;
  margin-top:10px;
  padding:22px 3px 7px;
}

@media(max-width:760px){
  #summaryContent{grid-template-columns:1fr;gap:8px}
  #summaryContent .card{padding:10px;border-radius:12px}
  #summaryContent .card h2{font-size:14px;margin-bottom:6px}
  #summaryContent table{font-size:10px}
  #summaryContent th,#summaryContent td{padding:5px 4px}
  #summaryContent .summary-highlight-grid{grid-template-columns:repeat(2,1fr)}
  #summaryContent .scroll{position:relative}
  #summaryContent .scroll th:first-child,#summaryContent .scroll td:first-child{position:sticky;left:0;z-index:1;background:var(--panel);box-shadow:2px 0 0 var(--line)}
  #summaryContent .swipe-hint{display:block}
}

@media(max-width:760px){
  .grid,.grid4{grid-template-columns:1fr}
  .wrap{padding:10px}
  header{padding:12px 14px}
  h1{font-size:20px}
  h2{font-size:17px}
  .card{border-radius:16px;padding:14px;margin:10px 0}
  input,select,button{font-size:16px;padding:14px;min-height:48px}
  .leader-row{grid-template-columns:1fr auto;gap:8px}
  .leader-row .small{grid-column:2}
  .score{font-size:28px}
  .team{padding:14px;border-radius:16px}
  .team h2{font-size:20px}
  table{font-size:12px}
  th,td{padding:8px 6px}
  .nav{padding:7px;gap:5px}
  .nav button{font-size:12px;padding:9px 3px}
}@media(max-width:760px){
  #scorePage .card:first-child button{
    font-weight:900;
  }

  #scorePage .score{
    text-shadow:0 1px 2px rgba(0,0,0,.35);
  }

  #scorePage .team{
    border-width:2px;
  }

  .high-contrast #scorePage button{
    border:2px solid #ffffff;
  }

  .high-contrast #scorePage .score{
    color:#00ff66;
  }
}
  .score-animation{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.72);
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:24px;
}

.score-animation-box{
  background:var(--panel);
  border:2px solid var(--line);
  border-radius:24px;
  padding:28px;
  max-width:360px;
  width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.45);
  animation:popIn .25s ease-out;
}

.score-animal{
  font-size:72px;
  line-height:1;
  margin-bottom:12px;
  animation:bounceAnimal .9s ease-in-out infinite;
}

.score-title{
  font-size:28px;
  font-weight:900;
  margin-bottom:8px;
}

.score-player{
  font-size:18px;
  color:var(--muted);
}

@keyframes popIn{
  from{transform:scale(.85);opacity:0}
  to{transform:scale(1);opacity:1}
}

@keyframes bounceAnimal{
  0%,100%{transform:translateY(0) rotate(0)}
  50%{transform:translateY(-12px) rotate(-4deg)}
}
.birdie-scene{
  position:relative;
  height:180px;
  overflow:hidden;
}

.birdie-tree{
  position:absolute;
  left:55%;
  bottom:20px;
  width:42px;
  height:130px;
  background:#7a4a25;
  border-radius:18px;
}

.birdie-woodpecker{
  position:absolute;
  left:28%;
  top:54px;
  font-size:70px;
  transform:scaleX(-1);
  animation:peckBird .22s infinite;
}

.birdie-chips{
  position:absolute;
  left:58%;
  top:74px;
  font-size:28px;
  animation:woodChips .45s infinite;
}

@keyframes peckBird{
  0%,100%{
    transform:scaleX(-1) translateX(0) rotate(0deg);
  }
  50%{
    transform:scaleX(-1) translateX(-18px) rotate(-8deg);
  }
}

@keyframes woodChips{
  0%{opacity:0;transform:scale(.5) translateX(0)}
  50%{opacity:1;transform:scale(1.2) translateX(15px)}
  100%{opacity:0;transform:scale(.5) translateX(30px)}
}
.eagle-scene{
  position:relative;
  height:180px;
  overflow:hidden;
}

.eagle-sky{
  position:absolute;
  inset:0;
  background:linear-gradient(#4aa3ff,#cdefff);
  border-radius:18px;
}

.eagle-bird{
  position:absolute;
  left:-80px;
  top:22px;
  font-size:76px;
  animation:eagleDive 1.4s ease-in-out infinite;
}

@keyframes eagleDive{
  0%{
    transform:translate(420px,-35px) scale(.8) rotate(-3deg);
  }

  35%{
    transform:translate(220px,-55px) scale(1.05) rotate(3deg);
  }

  70%{
    transform:translate(20px,-20px) scale(1.15) rotate(-2deg);
  }

  100%{
    transform:translate(-180px,-60px) scale(.9) rotate(2deg);
  }
}
.albatross-scene{
  position:relative;
  height:180px;
  overflow:hidden;
  border-radius:18px;
  background:linear-gradient(#55b7ff,#dff5ff);
}

.albatross-bird{
  position:absolute;
  left:50%;
  top:56px;
  transform:translateX(-50%);
  font-size:92px;
  animation:albatrossSpread 1.8s ease-in-out infinite;
}

.albatross-cloud{
  position:absolute;
  font-size:42px;
  opacity:.8;
  animation:cloudDrift 3s linear infinite;
}

.albatross-cloud.one{left:20px;top:22px}
.albatross-cloud.two{right:26px;top:42px;animation-delay:.8s}

@keyframes albatrossSpread{
  0%,100%{
    transform:translateX(-50%) scaleX(1) scaleY(1);
  }
  50%{
    transform:translateX(-50%) scaleX(1.65) scaleY(.92);
  }
}

@keyframes cloudDrift{
  0%{transform:translateX(0)}
  100%{transform:translateX(-35px)}
}
.par-scene{
  position:relative;
  height:180px;
  overflow:hidden;
  border-radius:18px;
  background:linear-gradient(#65c466 0%,#3f9f45 100%);
}

.par-green{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:70px;
  background:#267a32;
}

.par-cup{
  position:absolute;
  right:48px;
  bottom:54px;
  width:42px;
  height:16px;
  background:#111;
  border-radius:50%;
}

.par-flag{
  position:absolute;
  right:64px;
  bottom:66px;
  width:4px;
  height:70px;
  background:#ffffff;
}

.par-flag:after{
  content:'';
  position:absolute;
  top:0;
  left:4px;
  border-top:11px solid transparent;
  border-bottom:11px solid transparent;
  border-left:30px solid #ff4444;
}

.par-ball{
  position:absolute;
  left:18px;
  bottom:64px;
  width:22px;
  height:22px;
  background:#ffffff;
  border-radius:50%;
  box-shadow:inset -3px -3px 0 rgba(0,0,0,.12);
  animation:ballDrop 1.7s ease-in-out infinite;
}

@keyframes ballDrop{
  0%{transform:translate(0,0) scale(1);opacity:1}
  65%{transform:translate(220px,0) scale(1);opacity:1}
  78%{transform:translate(228px,9px) scale(.65);opacity:1}
  79%,100%{transform:translate(228px,13px) scale(.1);opacity:0}
}
.bogey-scene{
  position:relative;
  height:180px;
  overflow:hidden;
  border-radius:18px;
  background:linear-gradient(#8fd3ff,#dff5ff);
}

.bogey-ground{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:55px;
  background:#4f9b45;
}

.bogey-golfer{
  position:absolute;
  left:50%;
  bottom:42px;
  font-size:76px;
  transform:translateX(-50%);
  animation:bogeyRage .9s ease-in-out infinite;
}

.bogey-club{
  position:absolute;
  left:57%;
  top:67px;
  font-size:48px;
  animation:clubBreak .9s ease-in-out infinite;
}

@keyframes bogeyRage{
  0%,100%{transform:translateX(-50%) rotate(0)}
  40%{transform:translateX(-50%) rotate(-10deg)}
  65%{transform:translateX(-50%) rotate(8deg)}
}

@keyframes clubBreak{
  0%,45%{transform:rotate(-25deg) scale(1)}
  55%{transform:rotate(25deg) scale(1)}
  65%,100%{transform:rotate(55deg) scale(.7);opacity:.35}
}
.score-video{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:18px;
  display:block;
}

.scan-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.scan-actions button{min-height:74px;font-size:15px}
.scan-preview{border:1px dashed var(--line);border-radius:16px;padding:14px;margin-top:12px;text-align:center}
.scan-preview img{max-width:100%;max-height:320px;border-radius:12px}
.admin-feature-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.pdf-player-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.pdf-player-grid label{background:#0e1728;border:1px solid var(--line);padding:10px;border-radius:12px;margin:0;display:flex;align-items:center;gap:8px}
.pdf-player-grid input{width:auto}
.round-library{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.round-library-card{background:#0e1728;border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
.round-library-title{font-size:17px;font-weight:900;overflow-wrap:anywhere}
.round-library-date{margin-top:4px;color:var(--muted);font-size:11px}
.round-library-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:11px}
.round-library-actions button{min-height:38px;padding:8px 6px;font-size:12px;border-radius:10px}
@media(max-width:700px){.round-library{grid-template-columns:1fr}}
@media(max-width:700px){.scan-actions,.admin-feature-grid{grid-template-columns:1fr}.pdf-player-grid{grid-template-columns:repeat(2,1fr)}}

.gps-status{margin-top:8px;padding:10px;border:1px solid var(--line);border-radius:12px;background:#0e1728}
.scan-progress{height:10px;background:#18243a;border-radius:999px;overflow:hidden;margin:10px 0}
.scan-progress-bar{height:100%;width:0;background:var(--green);transition:width .2s ease}
.premium-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:999px;background:rgba(56,161,105,.14);border:1px solid #2f855a;font-size:11px;color:#c6f6d5}
.round-library-toolbar{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:10px}
@media(max-width:700px){.round-library-toolbar{grid-template-columns:1fr}}
</style></head><body>
<header><h1>地獄倒霉鬼</h1><div class="sub">雲端版 · 歷史紀錄 · 排行榜 · 管理員 · 多人使用</div><div id="userBar" class="small"></div></header><div class="wrap">
<section id="auth" class="page"><div class="card"><h2>登入</h2><p class="small">請輸入電子郵件再按登入即可.</p><div class="grid"><div><label>電子郵件</label><input id="authEmail" type="email" placeholder="you@example.com"></div><div><label>密碼</label><input id="authPassword" type="password" placeholder="Password"></div><button onclick="signInUser()">登入</button><button class="btn2" onclick="signUpUser()">建立帳號</button></div><div id="authMsg" class="small" style="margin-top:10px"></div></div></section>
<section id="setup" class="page hidden"><div class="card"><h2>資料庫狀態</h2><div id="dbStatus" class="small">Connecting...</div></div><div class="card"><div class="card"><h2>顯示設定</h2><label>主題</label><select id="themeSelector" onchange="changeTheme()"><option value="dark">Dark</option><option value="light">Light</option><option value="contrast">High Contrast</option></select></div><h2>新回合</h2><div class="grid"><div><label>國家</label>
<select id="country" onchange="setupCourseSelect()"></select>

<label>最近打過的球場</label>
<div id="recentCourses" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px"></div>

<label>搜尋球場</label>
<input id="courseSearch" placeholder="輸入球場名稱..." oninput="setupCourseSelect()">

<label>球場</label>
<select id="course"></select>
<button class="btn2" style="margin-top:10px" onclick="detectNearbyCourse()">📍 偵測附近球場</button>
<div id="gpsCourseStatus" class="gps-status small">尚未使用 GPS 偵測。</div></div><div id="comboBox" class="hidden"><label id="comboLabel">組合</label><select id="combo"></select></div><div><label>備註</label><input id="roundNote" placeholder="Sunday game"></div></div><p class="small">球場有超過18個洞，請選擇擊球的兩個場地.</p></div>
<div class="card"><label>球員人數</label>
<select id="playerCount" onchange="makePlayers(); renderMatchups();">
  <option value="4" selected>4 位球員</option>
  <option value="3">3 位球員</option>
  <option value="2">2 位球員</option>
</select><h2>球員 + 第一洞開球距離</h2><div class="grid4" id="playerInputs"></div><div class="grid" style="margin-top:12px"><button class="btn2" onclick="loadLastGroup()">載入上一場</button><button class="btn2" onclick="renderMatchups()">載入個人對戰</button><button onclick="startRound()">開始回合</button></div><p class="small">地獄倒霉鬼永遠開啟,不需要個人對戰可關閉.</p></div>
<div class="card"><h2>個人對戰</h2><label class="toggle">
  <input type="checkbox" id="useIndividualMatchups" checked onchange="toggleIndividualMatchups(this.checked)">
  使用個人對戰
  <br>

<label class="toggle">
  <input type="checkbox" id="countPar3Strokes">
  立偉模式
</label>
</label><div id="matchupSetup" class="small">請先輸入球員，然後點選載入個人對戰。</div></div></section>
<section id="scorePage" class="page hidden"><div id="scoreContent"></div></section><section id="liveViewer" class="page hidden">
  <div id="liveViewerContent"></div>
</section><section id="summary" class="page hidden"><div id="summaryContent"></div></section><section id="data" class="page hidden"><div class="card"><h2>Database</h2><button class="btn2" onclick="forceFullSync(this)">Refresh from server</button><div id="dataView" class="small" style="margin-top:10px"></div></div></section><section id="admin" class="page hidden"><div id="adminContent"></div></section></div>
<div class="nav hidden">
  <button id="navSetup" class="active" onclick="showPage('setup')">⚙️<br>設定</button>
  <button id="navScorePage" onclick="showPage('scorePage')">⛳<br>計分</button>
  <button id="navSummary" onclick="showPage('summary')">📊<br>統計</button>
  <button id="navData" onclick="showPage('data')">🗄️<br>資料</button>
  <button id="navAdmin" class="hidden" onclick="showPage('admin')">🔧<br>管理</button>
</div>
<script>

async function forceFullSync(button){

  try{
    if('caches' in window){
      const names=await caches.keys();
      await Promise.all(names.map(name=>caches.delete(name)));
    }
    if('serviceWorker' in navigator){
      const reg=await navigator.serviceWorker.getRegistration();
      if(reg) await reg.update();

  }finally{
    if(button){button.disabled=false;button.textContent='Refresh from server';}
  }
}

async function loadPaged(path){
  let all = [];
  let from = 0;
  const size = 1000;

  while(true){
    const rows = await sb(`${path}&limit=${size}&offset=${from}`);
    all.push(...rows);

    if(rows.length < size) break;

    from += size;
  }

  return all;
}

function courseCoordinates(c){
  const lat=Number(c?.latitude ?? c?.lat ?? c?.gps_latitude);
  const lng=Number(c?.longitude ?? c?.lng ?? c?.gps_longitude);
  return Number.isFinite(lat)&&Number.isFinite(lng)?{lat,lng}:null;
}
function distanceKm(aLat,aLng,bLat,bLng){
  const R=6371,toRad=v=>v*Math.PI/180;
  const dLat=toRad(bLat-aLat),dLng=toRad(bLng-aLng);
  const x=Math.sin(dLat/2)**2+Math.cos(toRad(aLat))*Math.cos(toRad(bLat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
}
function detectNearbyCourse(){
  const status=document.getElementById('gpsCourseStatus');
  if(!navigator.geolocation){if(status)status.innerHTML='<span class="bad">此裝置不支援 GPS。</span>';return;}
  const located=db.courses.filter(c=>courseCoordinates(c));
  if(!located.length){if(status)status.innerHTML='<span class="bad">球場尚未儲存 GPS 座標。請由管理員在 Course Manager 補上。</span>';return;}
  if(status)status.textContent='正在取得位置並尋找最近球場…';
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude,lng=pos.coords.longitude;
    const ranked=located.map(c=>({c,d:distanceKm(lat,lng,courseCoordinates(c).lat,courseCoordinates(c).lng)})).sort((a,b)=>a.d-b.d);
    const best=ranked[0];
    if(!best||best.d>25){if(status)status.innerHTML=`<span class="bad">25 公里內找不到已登錄球場。最近距離 ${best?best.d.toFixed(1):'?'} 公里。</span>`;return;}
    const country=document.getElementById('country');
    if(country){country.value=best.c.country||'Taiwan';setupCourseSelect();}
    const course=document.getElementById('course');
    if(course&&[...course.options].some(o=>o.value===best.c.course_name)){course.value=best.c.course_name;course.onchange();}
    if(status)status.innerHTML=`<span class="ok">已偵測：${adminEscapeHtml(courseLocalizedName(best.c))} · 約 ${best.d.toFixed(1)} 公里</span>`;
  },err=>{if(status)status.innerHTML=`<span class="bad">無法取得位置：${adminEscapeHtml(err.message||'請允許定位權限')}</span>`;},{enableHighAccuracy:true,timeout:12000,maximumAge:300000});
}

function buildCourse(){
  let c=document.getElementById('course').value;
  let comboBox=document.getElementById('comboBox');
  let combo=document.getElementById('combo');
  let keys=[];

  if(!comboBox.classList.contains('hidden') && combo.value){
    let comboValue=combo.value.trim();

    if(comboValue.includes('+')){
      keys=comboValue.split('+').map(x=>x.trim());
    }else{
      keys=comboValue.split('');
    }

    keys=keys.map(x=>{
      if(x.startsWith(c+'-')){
        return x;
      }

      return c+'-'+x;
    });

  }else{
    keys=[c];
  }

  let holes=[];

  keys.forEach(k=>{
    let course=db.courses.find(x=>x.course_name===k);

    if(!course){
      alert('Course not found: '+k);
      return;
    }

    let arr=db.holes
      .filter(h=>+h.course_id===+course.id)
      .sort((a,b)=>a.hole_number-b.hole_number);

    arr.forEach(h=>holes.push({
      display:k+' #'+h.hole_number,
      par:h.par,
      hcp:h.handicap_index,
      strokeEligible:h.stroke_eligible,
      roundHole:holes.length+1
    }));
  });

  return holes;
}

function playerPoint(score,par){let d=score-par; if(d<=-2)return 16; if(d===-1)return 8; if(d===0)return 4; if(d===1)return 2; if(d===2)return 1; return 0;}
function calcFortis(r){
  let n=r.players.length;
  if(n===2){
    return {totals:[0,0], rows:[]};
  }

  let totals=Array(n).fill(0), rows=[];

  let startIndex = r.startHoleIndex ?? 0;
  let playOrder = Array.from({length:18}, (_,i)=>(startIndex+i)%18);
  let prevRanks = r.initialRanks.map((rank,i)=>({i,rank}));

  for(let orderIndex=0; orderIndex<18; orderIndex++){
    let h = playOrder[orderIndex];

    let arr=r.players.map((p,i)=>{
      let scoreForPairing;

      if(orderIndex===0){
        scoreForPairing = r.initialRanks[i];
      }else{
        let prevHole = playOrder[orderIndex-1];
        scoreForPairing = r.scores[prevHole][i]==='' ? 999 : +r.scores[prevHole][i];
      }

      return {
        i,
        score: scoreForPairing,
        rank: prevRanks.find(x=>x.i===i).rank
      };
    });

    arr.sort((a,b)=>a.score-b.score || a.rank-b.rank);
    prevRanks = arr.map((x,idx)=>({
  i:x.i,
  rank:idx+1
}));

    if(n===3){
      let best=arr[0].i, mid=arr[1].i, worst=arr[2].i;

      let bestPts = r.scores[h][best]==='' ? 0 : playerPoint(+r.scores[h][best], r.course[h].par);
      let worstPts = r.scores[h][worst]==='' ? 0 : playerPoint(+r.scores[h][worst], r.course[h].par);
      let midPts = r.scores[h][mid]==='' ? 0 : playerPoint(+r.scores[h][mid], r.course[h].par);

      let teamBW = bestPts + worstPts;
      let middle = midPts * 2;
      let diff = teamBW - middle;

      totals[best] += diff;
      totals[worst] += diff;
      totals[mid] -= diff * 2;

      rows[h]={h,team1:[best,worst],team2:[mid],t1:teamBW,t2:middle};
    }

    if(n===4){
      let team1=[arr[0].i,arr[3].i];
      let team2=[arr[1].i,arr[2].i];

      let t1 = team1.reduce((a,i)=>
  a + (r.scores[h][i]==='' ? 0 : playerPoint(+r.scores[h][i], r.course[h].par)), 0
);

      let t2 = team2.reduce((a,i)=>
  a + (r.scores[h][i]==='' ? 0 : playerPoint(+r.scores[h][i], r.course[h].par)), 0
);

      let diff = t1 - t2;

      team1.forEach(i=>totals[i]+=diff);
      team2.forEach(i=>totals[i]-=diff);

      rows[h]={h,team1,team2,t1,t2};
    }
  }

  return {totals,rows};
}
function eligibleStrokeHoles(course,n){
  const countPar3 = document.getElementById('countPar3Strokes')?.checked === true;

  return [...course]
    .filter(h => countPar3 || h.strokeEligible)
    .sort((a,b)=>a.hcp-b.hcp)
    .slice(0,n)
    .map(h=>h.roundHole);
}
function bonusForScore(score,par){
  let diff=score-par;
  if(par===3 && score===1) return 10;
  if(diff<=-3) return 10;
  if(diff===-2) return 5;
  if(diff===-1) return 1;
  return 0;
}

function calcIndividual(r){
  return r.matchups.map(m=>{
    if(!m.active)return{...m,skipped:true};

    let ai=r.players.indexOf(m.a),
        bi=r.players.indexOf(m.b),
        strokeHoles=eligibleStrokeHoles(r.course,+m.strokes||0),
        match=0,
        bonusA=0,
        bonusB=0,
        totalResult=0;
    startResult = (m.receiver === m.a ? m.strokes : -m.strokes);

    for(let h=0;h<18;h++){
      let sa=r.scores[h][ai],
          sb=r.scores[h][bi],
          hole=r.course[h];

      if(sa==="" || sb==="") continue;

      let aStroke=strokeHoles.includes(h+1)&&m.receiver===m.a?1:0;
      let bStroke=strokeHoles.includes(h+1)&&m.receiver===m.b?1:0;

      let na=+sa-aStroke;
      let nb=+sb-bStroke;

      if(na<nb)match++;
      else if(nb<na)match--;

      let isLarryMode = document.getElementById('countPar3Strokes')?.checked === true;

if(!isLarryMode){
  bonusA+=bonusForScore(+sa,hole.par);
  bonusB+=bonusForScore(+sb,hole.par);
}
    }

    totalResult=startResult+match+bonusA-bonusB;

    return {
  ...m,
  strokeHoles,
  match,
  bonusA,
  bonusB,
  startResult,
  totalResult,
  winner: totalResult>0 ? m.a : totalResult<0 ? m.b : 'Tie'
};
  });
}
  function nextGive(m){
  let result=+(m.totalResult ?? m.match) || 0;
  let steps=Math.floor(Math.abs(result)/3);

  if(!steps){
    return {giver:m.giver,receiver:m.receiver,strokes:+m.strokes||0};
  }

  let strokes=+m.strokes||0,
      giver=m.giver,
      receiver=m.receiver;

  if(m.winner===m.giver){
    strokes+=steps;
  }else if(m.winner===m.receiver){
    strokes-=steps;
    if(strokes<0){
      [giver,receiver]=[receiver,giver];
      strokes=Math.abs(strokes);
    }
  }

  return {giver,receiver,strokes};
}

function renderHeadToHead(){
  let records={};

  db.history.forEach(h=>{
    let p1=h.giver;
    let p2=h.receiver;
    let key=[p1,p2].sort().join(' vs ');

    if(!records[key]){
      records[key]={
        players:key,
        pA:key.split(' vs ')[0],
        pB:key.split(' vs ')[1],
        winsA:0,
        winsB:0,
        ties:0,
        holeDiffA:0
      };
    }

    let rec=records[key];
    let result=+h.result_holes||0;

    let winner='';
    if(result>0) winner=h.giver;
    if(result<0) winner=h.receiver;

    if(result===0){
      rec.ties++;
    }else if(winner===rec.pA){
      rec.winsA++;
      rec.holeDiffA+=Math.abs(result);
    }else if(winner===rec.pB){
      rec.winsB++;
      rec.holeDiffA-=Math.abs(result);
    }
  });

  let html='<div class="card"><h2>對戰記錄</h2>';
  html+='<div class="scroll"><table><tr><th>對戰組合</th><th>戰績</th><th>洞數差</th><th>目前讓桿</th></tr>';

  Object.values(records)
    .sort((a,b)=>(b.winsA+b.winsB+b.ties)-(a.winsA+a.winsB+a.ties))
    .forEach(r=>{
      let current=db.matchups.find(m=>[m.giver,m.receiver].sort().join(' vs ')===r.players);
      let handicap = current
      ? `${current.giver} 讓 ${current.receiver} ${current.holes_given} 洞`
      : '-';

      html+=`<tr>
        <td><b>${r.players}</b></td>
        <td>${r.pA} ${r.winsA} 勝｜${r.pB} ${r.winsB} 勝｜平手 ${r.ties}</td>
        <td>${r.holeDiffA>0?'+':''}${r.holeDiffA}</td>
        <td>${handicap}</td>
      </tr>`;
    });

  html+='</table></div></div>';
  return html;
}

function renderLatestRoundHighlight(){
  let r=db.rounds[0];
  if(!r)return '<div class="card summary-highlight"><h2>最近一場</h2><p class="small">尚無已儲存回合。</p></div>';
  let roundScores=db.scores.filter(s=>String(s.round_id)===String(r.id));
  let players=Array.isArray(r.players)?r.players:[];
  let savedRound={players,initialRanks:r.initial_ranks||players.map((_,i)=>i+1),startHoleIndex:r.start_hole_index||0,course:r.course_data||[],scores:Array.from({length:18},()=>Array(players.length).fill(''))};
  roundScores.forEach(s=>{let pi=players.indexOf(s.player_name),hi=(+s.hole_number||1)-1;if(pi>=0&&hi>=0&&hi<18)savedRound.scores[hi][pi]=+s.gross_score});
  let fortisTotals=savedRound.course.length&&players.length?calcFortis(savedRound).totals:[];
  let leaderIndex=fortisTotals.length?fortisTotals.map((points,i)=>({points,i})).sort((a,b)=>b.points-a.points)[0].i:-1;
  let leader=leaderIndex>=0?players[leaderIndex]:'-';
  let leaderPoints=leaderIndex>=0?fortisTotals[leaderIndex]:null;
  let leaderScores = leaderIndex >= 0
  ? roundScores.filter(s => s.player_name === leader)
  : [];

  let birdies = leaderScores.filter(
  s => (+s.gross_score) - (+s.par) === -1
  ).length;

  let eagles = leaderScores.filter(
  s => +s.par !== 3 &&
       (+s.gross_score) - (+s.par) === -2
  ).length;

  let albatrosses = leaderScores.filter(
  s => +s.par !== 3 &&
       (+s.gross_score) - (+s.par) <= -3
  ).length;

  let holesInOne = leaderScores.filter(
  s => +s.par === 3 &&
       +s.gross_score === 1
  ).length;
  let bestAchievement=holesInOne?`一桿進洞 ${holesInOne}`:albatrosses?`信天翁 ${albatrosses}`:eagles?`老鷹 ${eagles}`:birdies?`博蒂 ${birdies}`:'—';
  return `<div class="card summary-highlight"><h2>最近一場精華</h2><div class="summary-highlight-grid"><div class="summary-stat"><span>日期</span><b>${String(r.played_at||r.created_at||'').slice(0,10)||'-'}</b></div><div class="summary-stat"><span>球場</span><b>${courseNameZh(r.course_name||r.course||'-')}</b></div><div class="summary-stat"><span>最大贏家</span><b>${leader}${leaderPoints===null?'':` (${leaderPoints>0?'+':''}${leaderPoints})`}</b></div><div class="summary-stat"><span>最佳成績</span><b>${bestAchievement}</b></div></div></div>`;
}
function courseNameZh(name){
  let value=String(name||'').trim();
  let names={'DH':'大溪高爾夫俱樂部','SR':'揚昇高爾夫鄉村俱樂部','TPE':'台北高爾夫俱樂部','TPE-A':'台北高爾夫俱樂部 A區','TPE-B':'台北高爾夫俱樂部 B區','TPE-C':'台北高爾夫俱樂部 C區','TPE-D':'台北高爾夫俱樂部 D區','TC':'台中國際高爾夫俱樂部','TC-E':'台中國際高爾夫俱樂部 東區','TC-C':'台中國際高爾夫俱樂部 中區','TC-W':'台中國際高爾夫俱樂部 西區'};
  return names[value]||value;
}
function applySummaryPlayerFilter(){
  if(summaryPlayer==='all')return;
  document.querySelectorAll('#summaryContent table').forEach(table=>Array.from(table.rows).slice(1).forEach(row=>row.classList.toggle('summary-filter-hidden',!row.textContent.includes(summaryPlayer))));
  document.querySelectorAll('#summaryContent .team').forEach(team=>team.classList.toggle('summary-filter-hidden',!team.textContent.includes(summaryPlayer)));
}
function compactSummarySections(){
  let groupNo=0;
  document.querySelectorAll('#summaryContent .card').forEach(card=>{
    card.querySelectorAll('.scroll > table').forEach(table=>{
      let rows=Array.from(table.rows).slice(1);
      if(rows.length<=5)return;
      let group='summaryGroup'+(++groupNo);
      rows.slice(5).forEach(row=>{row.classList.add('summary-hidden',group)});
      addSummaryToggle(table.parentElement,group,rows.length);
    });

    let teams=Array.from(card.children).filter(el=>el.classList.contains('team'));
    if(teams.length>5){
      let group='summaryGroup'+(++groupNo);
      teams.slice(5).forEach(team=>team.classList.add('summary-hidden',group));
      addSummaryToggle(card,group,teams.length,true);
    }
  });
}
function prepareSummaryCards(){
  let cards=Array.from(document.querySelectorAll('#summaryContent > .card:not(.summary-toolbar):not(.summary-highlight)'));
  document.querySelectorAll('#summaryContent .scroll').forEach(scroll=>scroll.insertAdjacentHTML('afterend','<div class="small swipe-hint">左右滑動查看更多 ↔</div>'));
  cards.forEach((card,index)=>{
    let heading=card.querySelector(':scope > h2');
    if(!heading)return;
    let title=document.createElement('div');title.className='summary-card-title';
    card.insertBefore(title,heading);title.appendChild(heading);
    let body=document.createElement('div');body.className='summary-card-body';
    while(title.nextSibling)body.appendChild(title.nextSibling);
    card.appendChild(body);
    let button=document.createElement('button');button.className='summary-collapse';button.type='button';button.setAttribute('aria-label','展開或收合');
    let collapsed=index>=5;body.classList.toggle('collapsed',collapsed);button.textContent=collapsed?'＋':'－';
    button.onclick=()=>{let closed=body.classList.toggle('collapsed');button.textContent=closed?'＋':'－'};
    title.appendChild(button);
  });
}
function addSummaryToggle(afterElement,group,total,append=false){
  let button=document.createElement('button');
  button.className='summary-more';
  button.dataset.group=group;
  button.dataset.total=total;
  button.textContent=`顯示全部 (${total})`;
  button.onclick=()=>toggleSummaryGroup(button);
  if(append)afterElement.appendChild(button);
  else afterElement.insertAdjacentElement('afterend',button);
}
function toggleSummaryGroup(button){
  let items=document.querySelectorAll('.'+button.dataset.group);
  let opening=Array.from(items).some(item=>item.classList.contains('summary-hidden'));
  items.forEach(item=>item.classList.toggle('summary-hidden',!opening));
  button.textContent=opening?'收合至 5 筆':`顯示全部 (${button.dataset.total})`;
}
function renderPlayerStats(){
  let stat={};

  db.scores.forEach(s=>{
    let name=s.player_name;
    if(!name) return;

    if(!stat[name]){
      stat[name]={
        holes:0,
        totalGross:0,
        rounds:{},
        birdies:0,
        eagles:0,
        albatross:0,
        hio:0,
        pars:0,
        bogeys:0,
        doubles:0,
        triples:0
      };
    }

    stat[name].holes++;
    stat[name].totalGross+=(+s.gross_score||0);

    if(!stat[name].rounds[s.round_id]){
      stat[name].rounds[s.round_id]=0;
    }

    stat[name].rounds[s.round_id]+=(+s.gross_score||0);

    if(s.score_type==='Birdie' || s.score_type==='博蒂') stat[name].birdies++;
    if(s.score_type==='Eagle' || s.score_type==='老鷹') stat[name].eagles++;
    if(s.score_type==='Hole In One' || s.score_type==='一桿進洞') stat[name].hio++;
    if(s.score_type==='Albatross' || s.score_type==='信天翁') stat[name].albatross++;
    if(s.score_type==='Par' || s.score_type==='標準桿') stat[name].pars++;
    if(s.score_type==='Bogey' || s.score_type==='柏忌') stat[name].bogeys++;
    if(s.score_type==='Double Bogey' || s.score_type==='雙柏忌') stat[name].doubles++;
    if(s.score_type==='Triple Bogey' || s.score_type==='三柏忌') stat[name].triples++;
  });

  let rows=Object.entries(stat).map(([name,s])=>{

    let roundScores=Object.values(s.rounds);

    let rounds=roundScores.length;

    let avgRound=rounds
      ? (s.totalGross/rounds).toFixed(1)
      : '-';

    let avgHole=s.holes
      ? (s.totalGross/s.holes).toFixed(2)
      : '-';

    let bestRound=roundScores.length
      ? Math.min(...roundScores)
      : '-';

    return {
      name,
      rounds,
      holes:s.holes,
      avgRound,
      avgHole,
      bestRound,
      birdies:s.birdies,
      eagles:s.eagles,
      albatross:s.albatross,
      hio:s.hio,
      pars:s.pars,
      bogeys:s.bogeys,
      doubles:s.doubles,
      triples:s.triples
    };

  }).sort((a,b)=>parseFloat(a.avgRound)-parseFloat(b.avgRound));

  let html=`
  <div class="card">
    <h2>球員數據看板</h2>
  `;

  if(!rows.length){
    html+=`
      <p class="small">
        尚無球員成績資料.
      </p>
    </div>
    `;
    return html;
  }

  html+=`
  <div class="scroll">
  <table>
    <tr>
      <th>球員</th>
      <th>回合</th>
      <th>最佳</th>
      <th>平均</th>
      <th>博蒂</th>
      <th>老鷹</th>
      <th>一桿進洞</th>
      <th>標準桿</th>
      <th>柏忌</th>
      <th>雙柏忌</th>
    </tr>
  `;

  rows.forEach(r=>{
    html+=`
    <tr>
      <td><b>${r.name}</b></td>
      <td>${r.rounds}</td>
      <td>${r.bestRound}</td>
      <td>${r.avgRound}</td>
      <td>${r.birdies}</td>
      <td>${r.eagles}</td>
      <td>${r.hio}</td>
      <td>${r.pars}</td>
      <td>${r.bogeys}</td>
      <td>${r.doubles}</td>
    </tr>
    `;
  });

  html+=`
    </table>
    </div>

    <p class="small">
      數據依照已儲存的成績計算.
    </p>
  </div>
  `;

  return html;
}

function renderSeasonLeaderboard(){  
  let activeSeason=db.seasons.find(s=>s.active===true || s.active==='true' || s.active==='TRUE');
  if(!activeSeason){
    return '<div class="card"><h2>球季排行榜</h2><p class="small">目前沒有啟用中的球季.</p></div>';
  }

  let seasonScores=db.scores.filter(s=>+s.season_id===+activeSeason.id);
  let stat={};

  seasonScores.forEach(s=>{
    let name=s.player_name;
    if(!name) return;

    if(!stat[name]){
      stat[name]={
        rounds:{},
        holes:0,
        gross:0,
        birdies:0,
        eagles:0,
        hio:0,
        albatross:0,
        pars:0
      };
    }

    stat[name].holes++;
    stat[name].gross+=(+s.gross_score||0);

    if(!stat[name].rounds[s.round_id]) stat[name].rounds[s.round_id]=0;
    stat[name].rounds[s.round_id]+=(+s.gross_score||0);

    if(s.score_type==='Birdie' || s.score_type==='博蒂') stat[name].birdies++;
    if(s.score_type==='Eagle' || s.score_type==='老鷹') stat[name].eagles++;
    if(s.score_type==='Hole In One' || s.score_type==='一桿進洞') stat[name].hio++;
    if(s.score_type==='Albatross' || s.score_type==='信天翁') stat[name].albatross++;
    if(s.score_type==='Par' || s.score_type==='標準桿') stat[name].pars++;
  });

  let rows=Object.entries(stat).map(([name,s])=>{
    let rounds=Object.keys(s.rounds).length;
    let avg=rounds ? (s.gross/rounds).toFixed(1) : '-';
    let seasonPoints =
      s.birdies*1 +
      s.eagles*5 +
      s.hio*10 +
      s.albatross*10 +
      s.pars*0.25 -
      (parseFloat(avg)||0);

    return {
      name,
      rounds,
      avg,
      birdies:s.birdies,
      eagles:s.eagles,
      hio:s.hio,
      albatross:s.albatross,
      seasonPoints:seasonPoints.toFixed(1)
    };
  }).sort((a,b)=>parseFloat(b.seasonPoints)-parseFloat(a.seasonPoints));

  let html=`<div class="card"><h2>${activeSeason.season_name} 排行榜</h2>`;

  if(!rows.length){
    return html+'<p class="small">本球季尚未有成績.</p></div>';
  }

  html+='<div class="scroll"><table><tr><th>排名</th><th>球員</th><th>分數</th><th>回合</th><th>平均</th><th>博蒂</th><th>老鷹</th><th>一桿進洞</th></tr>';

  rows.forEach((r,i)=>{
    let medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
    html+=`<tr>
      <td>${medal}</td>
      <td><b>${r.name}</b></td>
      <td>${r.seasonPoints}</td>
      <td>${r.rounds}</td>
      <td>${r.avg}</td>
      <td>${r.birdies}</td>
      <td>${r.eagles}</td>
      <td>${r.hio}</td>
    </tr>`;
  });

  html+='</table></div>';
  html+='<p class="small">Season leaderboard uses only scores with current active season_id.</p>';
  html+='</div>';

  return html;
}

function renderLifetimeRankings(){
  let stat={};

  function ensure(name){
    if(!stat[name]){
      stat[name]={
        rounds:{},
        totalGross:0,
        birdies:0,
        eagles:0,
        hio:0,
        albatross:0,
        wins:0,
        losses:0,
        ties:0,
        holeDiff:0
      };
    }
    return stat[name];
  }

  db.scores.forEach(s=>{
    let name=s.player_name;
    if(!name) return;

    let p=ensure(name);

    p.totalGross+=(+s.gross_score||0);

    if(!p.rounds[s.round_id]){
      p.rounds[s.round_id]=0;
    }

    p.rounds[s.round_id]+=(+s.gross_score||0);

    if(s.score_type==='Birdie' || s.score_type==='博蒂') p.birdies++;
    if(s.score_type==='Eagle' || s.score_type==='老鷹') p.eagles++;
    if(s.score_type==='Hole In One' || s.score_type==='一桿進洞') p.hio++;
    if(s.score_type==='Albatross' || s.score_type==='信天翁') p.albatross++;
  });

  db.history.forEach(h=>{
    let giver=ensure(h.giver);
    let receiver=ensure(h.receiver);
    let r=+h.result_holes||0;

    if(r>0){
      giver.wins++;
      receiver.losses++;
      giver.holeDiff+=r;
      receiver.holeDiff-=r;
    }else if(r<0){
      receiver.wins++;
      giver.losses++;
      receiver.holeDiff+=Math.abs(r);
      giver.holeDiff-=Math.abs(r);
    }else{
      giver.ties++;
      receiver.ties++;
    }
  });

  let rows=Object.entries(stat).map(([name,s])=>{
    let roundCount=Object.keys(s.rounds).length;
    let avg=roundCount ? s.totalGross/roundCount : 999;
    let winPoints=s.wins*3+s.ties;
    let scoringPoints=Math.max(0,100-avg);
    let bonusPoints=s.birdies*1+s.eagles*3+s.hio*10+s.albatross*10;
    let diffPoints=s.holeDiff*0.5;

    let lifetimeScore=
      scoringPoints+
      winPoints+
      bonusPoints+
      diffPoints;

    return {
  name,
  rounds:roundCount,
  avg:roundCount ? avg.toFixed(1) : '-',
  wins:s.wins,
  losses:s.losses,
  ties:s.ties,
  holeDiff:s.holeDiff,
  birdies:s.birdies,
  eagles:s.eagles,
  hio:s.hio,
  albatross:s.albatross,

  scoringPoints:scoringPoints.toFixed(1),
  winPoints:winPoints.toFixed(1),
  bonusPoints:bonusPoints.toFixed(1),
  diffPoints:diffPoints.toFixed(1),

  lifetimeScore:lifetimeScore.toFixed(1)
};
  }).sort((a,b)=>parseFloat(b.lifetimeScore)-parseFloat(a.lifetimeScore));

  let html='<div class="card"><h2>生涯排行榜</h2>';
  html+='<div class="scroll"><table><tr><th>排名</th><th>球員</th><th>戰力</th><th>平均桿數</th><th>勝-敗-平</th><th>洞數 +/-</th><th>博蒂</th><th>老鷹</th></tr>';

  rows.forEach((r,i)=>{
    let medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;

    html+=`<tr>
      <td>${medal}</td>
      <td><b>${r.name}</b></td>
      <td>
  <button
    class="btn2"
    style="width:auto;min-height:32px;padding:6px 10px;font-size:13px"
    onclick='openPowerPopup(${JSON.stringify(r)})'>
    ${r.lifetimeScore}
  </button>
</td>
      <td>${r.avg}</td>
      <td>${r.wins}-${r.losses}-${r.ties}</td>
      <td>${r.holeDiff>0?'+':''}${r.holeDiff}</td>
      <td>${r.birdies}</td>
      <td>${r.eagles}</td>
    </tr>`;
  });

  html+='</table></div>';
  html+='<p class="small">Score = scoring average + match wins + birdie/eagle bonuses + hole differential.</p>';
  html+='</div>';

async function scanFileToCanvas(){
  const file=scanImportState.file;if(!file)throw new Error('Choose a scorecard first.');
  if(file.type.startsWith('image/')){
    const img=await new Promise((resolve,reject)=>{const i=new Image();i.onload=()=>resolve(i);i.onerror=reject;i.src=URL.createObjectURL(file);});
    const max=2200,scale=Math.min(1,max/Math.max(img.width,img.height));
    const c=document.createElement('canvas');c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);
    const ctx=c.getContext('2d');ctx.drawImage(img,0,0,c.width,c.height);return c;
  }
  if(file.type==='application/pdf'){
    const pdfjs=window.pdfjsLib;if(!pdfjs)throw new Error('PDF reader is still loading. Please try again.');
    const bytes=new Uint8Array(await file.arrayBuffer());const pdf=await pdfjs.getDocument({data:bytes}).promise;const page=await pdf.getPage(1);
    const viewport=page.getViewport({scale:2.2});const c=document.createElement('canvas');c.width=viewport.width;c.height=viewport.height;
    await page.render({canvasContext:c.getContext('2d'),viewport}).promise;return c;
  }
  throw new Error('Unsupported file type.');
}
function scanExtractSequence(text,labelRegex,min,max,count){
  const lines=text.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
  const line=lines.find(x=>labelRegex.test(x));
  const candidates=[];
  if(line)candidates.push(line);
  for(let i=0;i<lines.length;i++)if(line&&lines[i]===line){candidates.push(lines[i+1]||'',lines[i+2]||'');}
  candidates.push(...lines);
  for(const row of candidates){
    const nums=(row.match(/\d{1,2}/g)||[]).map(Number).filter(n=>n>=min&&n<=max);
    if(nums.length>=count)return nums.slice(-count);
  }
  const all=(text.match(/\d{1,2}/g)||[]).map(Number);
  for(let i=0;i<=all.length-count;i++){const seq=all.slice(i,i+count);if(seq.every(n=>n>=min&&n<=max))return seq;}
  return [];
}
function scanParseOcr(text){
  const pars=scanExtractSequence(text,/\bPAR\b|標準桿|パー/i,3,6,18);
  let hcps=scanExtractSequence(text,/HCP|HDCP|HANDICAP|INDEX|難度/i,1,18,18);
  if(new Set(hcps).size!==18)hcps=[];
  const lines=text.split(/\r?\n/).map(x=>x.trim()).filter(x=>x.length>3);
  const courseLine=lines.find(x=>/GOLF|COUNTRY|CLUB|COURSE|高爾夫|ゴルフ/i.test(x)&&!(/PAR|HCP|HDCP/i.test(x)))||lines[0]||'';
  return {pars,hcps,courseLine};
}

    const result=await Tesseract.recognize(canvas,'eng+chi_tra+jpn',{logger:m=>{if(m.progress!=null){bar.style.width=Math.round(m.progress*100)+'%';status.textContent=(m.status||'Reading scorecard')+' · '+Math.round(m.progress*100)+'%';}}});
    scanImportState.ocrText=result.data.text||'';scanImportState.confidence=Math.round(result.data.confidence||0);
    const parsed=scanParseOcr(scanImportState.ocrText);scanFillDetected(parsed);
    const found=[];if(parsed.pars.length===18)found.push('18 pars');if(parsed.hcps.length===18)found.push('18 handicap indexes');if(parsed.courseLine)found.push('course name candidate');
    status.innerHTML=`<span class="ok">AI reading complete (${scanImportState.confidence}% confidence).</span> Found: ${found.join(', ')||'partial text only'}. Please review before saving.`;
    bar.style.width='100%';
  }catch(e){status.innerHTML=`<span class="bad">AI reading failed: ${adminEscapeHtml(e.message)}</span>`;}finally{btn.disabled=false;}
}

function historicalRoundData(roundId){
  const rec=db.rounds.find(r=>String(r.id)===String(roundId));
  if(!rec)throw new Error('找不到這一回合。');
  const scoreRows=db.scores.filter(s=>String(s.round_id)===String(roundId));
  const players=Array.isArray(rec.players)&&rec.players.length?rec.players:[...new Set(scoreRows.map(s=>s.player_name))];
  if(!players.length)throw new Error('這一回合沒有球員資料。');
  let course=Array.isArray(rec.course_data)?rec.course_data:[];
  if(course.length<18){
    course=Array.from({length:18},(_,i)=>{
      const one=scoreRows.find(s=>+s.hole_number===i+1);
      return {roundHole:i+1,display:one?.course_hole||`Hole ${i+1}`,par:+one?.par||4,hcp:+one?.handicap_index||i+1,strokeEligible:(+one?.par||4)!==3};
    });
  }
  const scores=Array.from({length:18},()=>Array(players.length).fill(''));
  scoreRows.forEach(x=>{const h=(+x.hole_number||1)-1,i=players.indexOf(x.player_name);if(h>=0&&h<18&&i>=0)scores[h][i]=+x.gross_score;});
  const reconstructed={players,initialRanks:rec.initial_ranks||players.map((_,i)=>i+1),startHoleIndex:rec.start_hole_index||0,course,scores};
  const fortis=calcFortis(reconstructed).totals;
  const courseRec=db.courses.find(c=>c.course_name===rec.course_name);
  const comboRec=db.course_combos.find(c=>c.parent_course_code===rec.course_name&&c.combo_code===rec.course_combo);
  const english=courseRec?.display_name||comboRec?.parent_course_name||rec.course_name||'';
  const chinese=courseRec?.display_name_zh||'';
  return {rec,players,course,scores,fortis,english,chinese,combo:rec.course_combo||'',date:(rec.played_at||'').slice(0,10),title:(rec.round_name||'').trim()||[rec.course_name,rec.course_combo].filter(Boolean).join(' ')};
}

function historicalDrawHeaderCanvas(data){

  ctx.font='24px Arial, "Noto Sans TC", sans-serif';ctx.fillText(meta,900,242);

function historicalDrawScoreMark(doc,x,y,w,h,score,par){
  if(score===''||score==null)return;
  const d=+score-(+par||0),cx=x+w/2,cy=y+h/2,r=Math.min(w,h)*0.31;
  doc.setDrawColor(0);doc.setLineWidth(.42);
  if(d<0){doc.circle(cx,cy,r);if(d<=-2)doc.circle(cx,cy,r-1.15);}
  else if(d>0){doc.rect(cx-r,cy-r,r*2,r*2);if(d>=2)doc.rect(cx-r+1.1,cy-r+1.1,r*2-2.2,r*2-2.2);}
}
function historicalDrawPlayerName(doc,name,x,y,w,h){

  ctx.fillStyle='#111';ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.font='700 70px "Microsoft JhengHei", "Noto Sans TC", "PingFang TC", Arial, sans-serif';

}
async function historicalCreateScorecardPdf(roundId){
  if(!window.jspdf?.jsPDF)throw new Error('PDF library has not loaded.');
  const data=historicalRoundData(roundId),{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  try{const logo=await new Promise(resolve=>{const img=new Image();img.onload=()=>resolve(img);img.onerror=()=>resolve(null);img.src='icon-192.png';});if(logo)doc.addImage(logo,'PNG',137,4,23,23);}catch(e){}
  doc.addImage(historicalDrawHeaderCanvas(data),'PNG',28,27,241,40);
  const headers=['','1','2','3','4','5','6','7','8','9','OUT','10','11','12','13','14','15','16','17','18','IN','TOTAL'];
  const par=data.course.map(h=>+h.par||0),hcp=data.course.map(h=>+h.hcp||'');
  const total9=a=>a.reduce((s,v)=>s+(+v||0),0);
  const expand=a=>[...a.slice(0,9),total9(a.slice(0,9)),...a.slice(9,18),total9(a.slice(9,18)),total9(a)];
  const body=[['PAR',...expand(par)],['HCP',...expand(hcp).map((v,i)=>[9,19,20].includes(i)?'':v)]];
  data.players.forEach((p,pi)=>body.push(['',...expand(data.scores.map(row=>row[pi]))]));
  doc.autoTable({head:[headers],body,startY:70,theme:'grid',margin:{left:7,right:7},styles:{font:'helvetica',fontSize:6.4,cellPadding:1.2,halign:'center',valign:'middle',textColor:[0,0,0],lineColor:[0,0,0],lineWidth:.18,minCellHeight:8,fillColor:[255,255,255]},headStyles:{fillColor:[245,245,245],fontStyle:'bold'},columnStyles:{0:{cellWidth:28,halign:'left',fontStyle:'bold'}},didDrawCell:hook=>{
    if(hook.section!=='body')return;
    if(hook.row.index>=2&&hook.column.index===0){
      historicalDrawPlayerName(doc,data.players[hook.row.index-2],hook.cell.x,hook.cell.y,hook.cell.width,hook.cell.height);
      return;
    }
    if(hook.row.index<2||hook.column.index===0)return;
    const ci=hook.column.index-1;if([9,19,20].includes(ci))return;
    const hole=ci<9?ci:ci-1;const actualHole=hole<18?hole:null;if(actualHole==null)return;
    const pi=hook.row.index-2,score=data.scores[actualHole]?.[pi];
    historicalDrawScoreMark(doc,hook.cell.x,hook.cell.y,hook.cell.width,hook.cell.height,score,data.course[actualHole]?.par);
  }});
  let y=doc.lastAutoTable.finalY+5;
  const max=Math.max(...data.fortis),min=Math.min(...data.fortis);
  const resultCanvas=document.createElement('canvas');resultCanvas.width=1200;resultCanvas.height=170+data.players.length*58;
  const rc=resultCanvas.getContext('2d');rc.fillStyle='#fff';rc.fillRect(0,0,resultCanvas.width,resultCanvas.height);rc.strokeStyle='#111';rc.lineWidth=2;rc.textBaseline='middle';
  rc.textAlign='center';rc.fillStyle='#111';rc.font='700 38px Arial, "Noto Sans TC", sans-serif';rc.fillText('誰是地獄倒楣鬼',600,45);
  data.players.forEach((p,i)=>{const top=85+i*58;rc.strokeRect(120,top,960,52);rc.textAlign='left';rc.font='28px Arial, "Noto Sans TC", sans-serif';const badges=`${data.fortis[i]===max?'🥇 ':''}${data.fortis[i]===min?'😈 ':''}`;rc.fillText(badges+p,145,top+26);rc.textAlign='right';rc.font='700 28px Arial, sans-serif';rc.fillText(String(data.fortis[i]??0),1050,top+26);});
  const resultHeight=Math.min(48,8+data.players.length*10);
  doc.addImage(resultCanvas.toDataURL('image/png'),'PNG',78,y,141,resultHeight);
  const name=`${historicalSafeFileName(data.date)}_${historicalSafeFileName(data.title)}.pdf`;
  return {doc,blob:doc.output('blob'),name,data};
}
async function historicalGenerateScorecardPdf(roundId,mode){
  try{
    const out=await historicalCreateScorecardPdf(roundId);
    if(mode==='download'){out.doc.save(out.name);return;}
    const file=new File([out.blob],out.name,{type:'application/pdf'});
    if(navigator.canShare&&navigator.canShare({files:[file]}))await navigator.share({title:out.data.title,text:out.data.title,files:[file]});
    else{out.doc.save(out.name);alert('此裝置無法直接分享 PDF，已改為下載。');}
  }catch(e){if(e?.name!=='AbortError')alert('PDF failed: '+e.message);}
}

    </div>
    <div class="scroll" style="margin-top:12px"><table><tr><th>Hole</th><th>Par</th><th>Handicap</th><th>Stroke eligible</th></tr>${rows.join('')}</table></div>
    <div class="grid" style="margin-top:12px">
      <button onclick="adminSaveCourseManager()">Save Course & All Holes</button>
      <button class="btn2" onclick="adminLoadCourseManager()">Discard Changes</button>
    </div>
    <p class="small">Saving replaces this course's complete hole list. Par 3 stroke eligibility can be changed manually.</p>`;
}
function adminCourseManagerDirty(){
  const el=document.getElementById('admCourseDirty');
  if(el) el.value='Unsaved changes';
}
function adminSyncStroke(n){
  const par=+document.getElementById('admGridPar'+n)?.value;
  const stroke=document.getElementById('admGridStroke'+n);
  if(stroke&&par===3) stroke.checked=false;
}
function adminChangeHoleCount(){
  const count=+(document.getElementById('admEditHoleCount')?.value||18);
  sessionStorage.setItem('fortisNewCourseHoleCount',String(count));
  adminCourseManagerDirty();
  adminLoadCourseManager();
  const el=document.getElementById('admCourseDirty');
  if(el) el.value='Hole count changed';
}
function adminUseCurrentCoordinates(){
  if(!navigator.geolocation)return alert('GPS is not supported on this device.');
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=document.getElementById('admEditLatitude'),lng=document.getElementById('admEditLongitude');
    if(lat)lat.value=pos.coords.latitude.toFixed(7);if(lng)lng.value=pos.coords.longitude.toFixed(7);adminCourseManagerDirty();
  },e=>alert('Could not get location: '+e.message),{enableHighAccuracy:true,timeout:12000});
}
async function adminSaveCourseManager(){
  const select=document.getElementById('admManageCourse');
  const course=db.courses.find(c=>String(c.id)===String(select?.value));
  if(!course) return alert('Select a course first.');
  const course_name=(document.getElementById('admEditCode')?.value||'').trim().toUpperCase();
  const display_name=(document.getElementById('admEditDisplay')?.value||'').trim();
  const display_name_zh=(document.getElementById('admEditDisplayZh')?.value||'').trim()||null;
  const display_name_ja=(document.getElementById('admEditDisplayJa')?.value||'').trim()||null;
  const country=(document.getElementById('admEditCountry')?.value||'Taiwan').trim();
  const course_group=(document.getElementById('admEditGroup')?.value||'').trim().toUpperCase()||null;
  const latitudeRaw=(document.getElementById('admEditLatitude')?.value||'').trim();
  const longitudeRaw=(document.getElementById('admEditLongitude')?.value||'').trim();
  const latitude=latitudeRaw===''?null:Number(latitudeRaw), longitude=longitudeRaw===''?null:Number(longitudeRaw);
  if((latitude!==null&&!Number.isFinite(latitude))||(longitude!==null&&!Number.isFinite(longitude)))return alert('Invalid GPS coordinates.');
  const holeCount=+(document.getElementById('admEditHoleCount')?.value||18);
  if(!course_name||!(display_name||display_name_zh||display_name_ja)||!country) return alert('Course code, country, and at least one course name are required.');
  if(db.courses.some(c=>+c.id!==+course.id&&(c.course_name||'').toUpperCase()===course_name)) return alert('Course code already exists: '+course_name);
  const holes=[];
  const seenHcp=new Set();
  for(let n=1;n<=holeCount;n++){
    const par=+(document.getElementById('admGridPar'+n)?.value||0);
    const handicap_index=+(document.getElementById('admGridHcp'+n)?.value||0);
    const stroke_eligible=document.getElementById('admGridStroke'+n)?.checked===true;
    if(![3,4,5,6].includes(par)) return alert(`Hole ${n}: invalid par.`);
    if(handicap_index<1||handicap_index>holeCount) return alert(`Hole ${n}: handicap must be 1-${holeCount}.`);
    if(seenHcp.has(handicap_index)) return alert(`Duplicate handicap index: ${handicap_index}.`);
    seenHcp.add(handicap_index);
    holes.push({course_id:+course.id,hole_number:n,par,handicap_index,stroke_eligible});
  }
  const saveName=display_name_zh||display_name_ja||display_name;
  if(!confirm(`Save ${saveName} and replace all ${holeCount} hole records?`)) return;
  try{
    await sb(`courses?id=eq.${course.id}`,{method:'PATCH',body:JSON.stringify({course_name,display_name:display_name||display_name_zh||display_name_ja,display_name_zh,display_name_ja,country,course_group,latitude,longitude})});
    await sb(`holes?course_id=eq.${course.id}`,{method:'DELETE'});
    await sb('holes',{method:'POST',body:JSON.stringify(holes)});
    sessionStorage.removeItem('fortisNewCourseHoleCount');
    sessionStorage.removeItem('fortisNewCourseId');
    await loadAll();
    renderAdmin();
    const newSelect=document.getElementById('admManageCourse');
    if(newSelect){newSelect.value=String(course.id);adminLoadCourseManager();}
    alert(`Saved ${saveName}: ${holeCount} holes.`);
  }catch(e){
    alert('Save course failed: '+e.message);
  }
}
async function adminResetStats(){
  if(!confirm('Reset all round stats? This deletes hole_scores and fortis_rounds only. Matchups stay.')) return;

  try{
    await sb('hole_scores?id=gte.0',{method:'DELETE'});
    await sb('fortis_rounds?id=gte.0',{method:'DELETE'});
    await loadAll();
    renderAdmin();
    alert('Stats reset complete. Matchups were not erased.');
  }catch(e){
    alert('Reset failed: '+e.message);
  }
}

async function adminStartNewSeason(){
  if(!confirm('Close current season and start a new one?')) return;

  try{
    await loadAll();

    let activeSeason=db.seasons.find(s=>s.active===true || s.active==='true' || s.active==='TRUE');

if(!activeSeason && db.seasons.length){
  activeSeason=db.seasons[db.seasons.length-1];
}

    await sb(`seasons?id=eq.${activeSeason.id}`,{
      method:'PATCH',
      body:JSON.stringify({
        active:false,
        ended_at:new Date().toISOString()
      })
    });

    const nextSeasonNumber=db.seasons.length+1;

    await sb('seasons',{
      method:'POST',
      body:JSON.stringify({
        season_name:`Season ${nextSeasonNumber}`,
        active:true,
        started_at:new Date().toISOString()
      })
    });

    await loadAll();
    renderAdmin();
    alert(`Season ${nextSeasonNumber} started`);
  }catch(e){
    alert('Start season failed: '+e.message);
  }
}
function showPage(id){
  currentPage=id;

  document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');

  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));

  let nb=document.getElementById('nav'+id[0].toUpperCase()+id.slice(1)); 
  if(nb) nb.classList.add('active'); 

  if(id==='summary') renderSummary();
  if(id==='admin') renderAdmin();
  if(id==='setup') renderRecentCourses();

function changeTheme(){
  const mode=document.getElementById('themeSelector')?.value||'dark';
  document.body.classList.remove('light-theme','high-contrast');

  if(mode==='light') document.body.classList.add('light-theme');
  if(mode==='contrast') document.body.classList.add('high-contrast');

  localStorage.setItem('fortisTheme',mode);
}

const savedTheme=localStorage.getItem('fortisTheme');
if(savedTheme==='light') document.body.classList.add('light-theme');
if(savedTheme==='contrast') document.body.classList.add('high-contrast');

init();

let replayScores = [];
let replayHoles = [];
let replayIndex = 0;
let replayRoundObj = null;
let replayCalc = null;

async function replayRound(roundId) {
  const roundRec = db.rounds.find(r => Number(r.id) === Number(roundId));

  const { data, error } = await authClient
    .from('hole_scores')
    .select('*')
    .eq('round_id', Number(roundId))
    .order('hole_number');

  if (error) {
    alert("Replay error: " + error.message);
    return;
  }

  if (!data || !data.length) {
    alert("No scores found.");
    return;
  }

  const players = roundRec?.players || [...new Set(data.map(s => s.player_name))];
  let course = roundRec?.course_data || [];

if (!course || !course.length) {
  course = [];

  for (let h = 1; h <= 18; h++) {
    const one = data.find(s => Number(s.hole_number) === h);

    course.push({
      roundHole: h,
      display: one?.course_hole || 'Hole ' + h,
      par: Number(one?.par || 4),
      hcp: Number(one?.handicap_index || h),
      strokeEligible: Number(one?.par || 4) !== 3
    });
  }
}

  replayRoundObj = {
    players,
    initialRanks: roundRec?.initial_ranks || players.map((_,i)=>i+1),
    startHoleIndex: roundRec?.start_hole_index || 0,
    course,
    scores: Array.from({length:18},()=>Array(players.length).fill(''))
  };

  data.forEach(s => {
    const h = Number(s.hole_number) - 1;
    const i = players.indexOf(s.player_name);
    if (h >= 0 && i >= 0) {
      replayRoundObj.scores[h][i] = s.gross_score;
    }
  });

  replayScores = data;
  replayHoles = [...new Set(data.map(x => Number(x.hole_number)))].sort((a,b)=>a-b);
  replayIndex = 0;
  replayCalc = calcFortis(replayRoundObj);
  

  showReplayPanel();
}

function showReplayPanel() {
  let box = document.getElementById('replayPanel');

  if (!box) {
    box = document.createElement('div');
    box.id = 'replayPanel';
    box.className = 'card';
    box.style.marginTop = '16px';

    const target =
      document.getElementById('summaryContent') ||
      document.getElementById('summary') ||
      document.body;

    target.appendChild(box);
  }

  const holeNo = replayHoles[replayIndex];
  const h = holeNo - 1;
  const holeData = replayScores.filter(x => Number(x.hole_number) === holeNo);
  const row = replayCalc.rows[h];

  const isTwoPlayerReplay = replayRoundObj.players.length === 2;

  let pairingText = '';

  if (isTwoPlayerReplay) {
    pairingText = `${replayRoundObj.players[0]} vs ${replayRoundObj.players[1]}`;
  } else {
    pairingText = `Team 1: ${row.team1.map(i=>replayRoundObj.players[i]).join(' + ')}
      vs Team 2: ${row.team2.map(i=>replayRoundObj.players[i]).join(' + ')}${row.team2.length===1?' x2':''}`;
  }

  let html = `
    <h2>賽事回播</h2>
    <h3>第 ${holeNo} 洞</h3>
    <div class="small">配對: <b>${pairingText}</b></div>

    <div class="scroll">
      <table>
        <tr>
          <th>球員</th>
          <th>桿數</th>
          <th>地獄倒霉鬼分</th>
          <th>配對</th>
        </tr>
  `;

  replayRoundObj.players.forEach((p,i)=>{
    const s = holeData.find(x =>
      String(x.player_name || '').trim().toLowerCase() ===
      String(p || '').trim().toLowerCase()
    ) || holeData[i];

    const strokes = s?.gross_score ?? '';

    const pts = isTwoPlayerReplay
      ? ''
      : (strokes === '' ? '' : playerPoint(Number(strokes), replayRoundObj.course[h].par));

    const pairing = isTwoPlayerReplay
      ? 'Individual'
      : (row.team1.includes(i) ? 'Team 1' : 'Team 2');

    html += `
      <tr>
        <td>${p}</td>
        <td>${strokes}</td>
        <td>${pts}</td>
        <td>${pairing}</td>
      </tr>
    `;
  });

  html += `
      </table>
    </div>

    ${isTwoPlayerReplay ? '' : `
      <p class="small">
        Team 1 Points: ${row.t1} · Team 2 Points: ${row.t2}
      </p>
    `}

    <button class="btn2" onclick="prevReplayHole()">◀ Previous</button>
    <button class="btn2" onclick="nextReplayHole()">Next ▶</button>
    <button class="btn2" onclick="closeReplay()">Close</button>
  `;

  box.innerHTML = html;
  box.scrollIntoView({ behavior:'smooth' });
}

function nextReplayHole() {
  if (replayIndex < replayHoles.length - 1) {
    replayIndex++;
    showReplayPanel();
  }
}

function prevReplayHole() {
  if (replayIndex > 0) {
    replayIndex--;
    showReplayPanel();
  }
}

function closeReplay() {
  const box = document.getElementById('replayPanel');
  if (box) box.remove();
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closePowerPopup();
  }
});
